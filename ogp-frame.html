<!doctype html>
<html lang="ja"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Segoe UI",sans-serif;}
  .c{width:1200px;height:630px;background:#faf7f0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px;}
  h1{font-size:88px;font-weight:900;letter-spacing:0.04em;color:#21303a;margin-bottom:34px;}
  h1 .g{color:#35b37e;} h1 .o{color:#f2a33c;}
  .tiles{display:flex;gap:16px;margin-bottom:34px;}
  .t{width:110px;height:110px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:800;color:#fff;}
  .hit{background:#35b37e;} .near{background:#f2a33c;} .miss{background:#7b8a92;}
  .sub{font-size:38px;font-weight:800;color:#21303a;}
  .sub2{font-size:28px;font-weight:700;color:#6b7a83;margin-top:14px;}
  .foot{position:absolute;bottom:40px;font-size:22px;font-weight:700;color:#9fb0aa;}
</style></head>
<body>
  <div class="c">
    <h1>ことば<span class="g">ア</span><span class="o">タ</span>ック</h1>
    <div class="tiles">
      <div class="t hit">こ</div><div class="t near">と</div><div class="t miss">ば</div><div class="t hit">？</div>
    </div>
    <div class="sub">4文字のことばを6回で当てるパズル</div>
    <div class="sub2">毎日1問・無料・結果を絵文字でシェア</div>
    <div class="foot">「AI CEO」プロジェクト運営</div>
  </div>
</body></html>
